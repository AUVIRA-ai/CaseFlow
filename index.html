<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CaseFlow | History Taking Simulation</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg1:#faf8ff;
    --bg2:#f6fbff;
    --app-height:100dvh;
    --dock-clearance:54px;
    --safe-top:max(env(safe-area-inset-top), 0px);
    --safe-right:max(env(safe-area-inset-right), 0px);
    --safe-bottom:max(env(safe-area-inset-bottom), 0px);
    --safe-left:max(env(safe-area-inset-left), 0px);

    --text:#111827;
    --muted:#6b7280;

    --purple1:#0b3fb3;
    --purple2:#1d4ed8;
    --purple3:#3b82f6;

    --teal1:#0ea5e9;
    --teal2:#9b6da8;

    --shadow1: 0 30px 80px rgba(17,24,39,0.10);
    --shadow2: 0 18px 60px rgba(37,99,235,0.12);

    --inset: inset 0 1px 0 rgba(255,255,255,0.75);
    --ring: 0 0 0 4px rgba(37,99,235,0.18);

    --radiusCard: 42px;
    --radiusInput: 22px;
    --radiusPill: 999px;
  }

  *{ box-sizing:border-box; }
  html,body{
    min-height:100%;
    height:100%;
  }
  body{
    min-height:var(--app-height);
    margin:0;
    font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
    color:var(--text);
    background:
      radial-gradient(900px 520px at 20% 20%, rgba(37,99,235,0.16), transparent 60%),
      radial-gradient(800px 520px at 80% 30%, rgba(96,165,250,0.12), transparent 60%),
      radial-gradient(900px 600px at 50% 90%, rgba(59,130,246,0.12), transparent 60%),
      linear-gradient(160deg, var(--bg1), var(--bg2));
    display:flex;
    align-items:center;
    justify-content:center;
    padding: calc(24px + var(--safe-top)) calc(24px + var(--safe-right)) calc(110px + var(--safe-bottom)) calc(24px + var(--safe-left));
    overflow:auto;
  }
  body.view-chat,
  body.view-report{
    overflow:hidden;
  }
  body.view-chat,
  body.view-report{
    padding-bottom:calc(24px + var(--safe-bottom));
  }

  /* soft background blobs */
  .blob{
    position:absolute;
    filter: blur(60px);
    opacity: 0.55;
    z-index:0;
    pointer-events:none;
  }
  .b1{
    width: 520px; height: 520px;
    left: -180px; top: -140px;
    background: radial-gradient(circle at 30% 30%, rgba(37,99,235,0.52), rgba(37,99,235,0.05));
  }
  .b2{
    width: 520px; height: 520px;
    right: -200px; top: -120px;
    background: radial-gradient(circle at 40% 40%, rgba(96,165,250,0.42), rgba(96,165,250,0.05));
  }
  .b3{
    width: 560px; height: 560px;
    left: 20%; bottom: -260px;
    background: radial-gradient(circle at 40% 40%, rgba(59,130,246,0.32), rgba(59,130,246,0.05));
  }

  /* ---------- START CARD (UNCHANGED AESTHETIC) ---------- */
  .wrap{
    width:100%;
    min-height:calc(var(--app-height) - 134px);
    display:flex;
    justify-content:center;
    align-items:stretch;
    z-index:1;
    overflow:auto;
  }
  .card{
    width:100%;
    min-height:100%;
    border-radius: var(--radiusCard);
    background: linear-gradient(180deg, rgba(255,255,255,0.80), rgba(255,255,255,0.62));
    border: 1px solid rgba(255,255,255,0.65);
    box-shadow: var(--shadow1), var(--shadow2);
    backdrop-filter: blur(18px);
    position:relative;
    overflow:hidden;
  }
  .card::before{
    content:"";
    position:absolute;
    inset:0;
    background:
      radial-gradient(900px 500px at 50% -20%, rgba(37,99,235,0.16), transparent 60%),
      radial-gradient(700px 500px at 50% 120%, rgba(96,165,250,0.10), transparent 60%);
    pointer-events:none;
  }
  .content{
    position:relative;
    min-height:100%;
    padding: 48px 56px 40px;
    display:flex;
    flex-direction:column;
    justify-content:center;
  }
  .brand{
    display:flex;
    align-items:center;
    justify-content:center;
    margin-top: 0;
    margin-bottom: 28px;
  }
  .brand h1{
    margin:0;
    font-size: clamp(46px, 7vw, 84px);
    letter-spacing:-0.03em;
    font-weight: 800;
    background: linear-gradient(90deg, #0b3fb3, #1d4ed8, #3b82f6);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    text-shadow: 0 10px 40px rgba(37,99,235,0.18);
  }
  .auviraBrand{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:10px;
    text-align:center;
  }
  .auviraMark{
    margin:0;
    font-family: "Plus Jakarta Sans", Inter, system-ui, sans-serif;
    font-size: 44px;
    font-weight: 800;
    letter-spacing: 0.24em;
    text-transform: uppercase;
    line-height: 1;
    background: linear-gradient(90deg, #102f9d, #2244b6, #769ef6);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    text-indent: 0.24em;
    text-shadow: 0 10px 28px rgba(77, 116, 196, 0.16);
  }
  .auviraLine{
    width: 86px;
    height: 3px;
    border-radius: 999px;
    background: linear-gradient(90deg, #102f9d, #2244b6, #4d74c4);
    opacity: 0.78;
  }
  .auviraSub{
    margin:0;
    max-width: 360px;
    font-size: 10px;
    font-weight: 800;
    line-height: 1.45;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #6381d2;
  }
  .chatBrand{
    display:flex;
    flex-direction:column;
    gap:4px;
    min-width:0;
  }
  .chatBrandMark{
    margin:0;
    font-family: "Plus Jakarta Sans", Inter, system-ui, sans-serif;
    font-size:14px;
    font-weight:800;
    line-height:1;
    letter-spacing:0.24em;
    text-transform:uppercase;
    color:#2244b6;
    text-indent:0.24em;
  }
  .chatBrandSub{
    font-size:11px;
    font-weight:700;
    line-height:1.2;
    letter-spacing:0.08em;
    text-transform:uppercase;
    color:#6381d2;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  .grid{
    display:grid;
    gap: 16px;
    margin: 0 auto;
    width:min(1120px, 100%);
  }
  .label{
    font-size: 12px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: rgba(107,114,128,0.85);
    font-weight: 700;
    margin-bottom: 8px;
  }
  .input{
    width:100%;
    height: 56px;
    border-radius: var(--radiusInput);
    border: 1px solid rgba(17,24,39,0.06);
    background: rgba(255,255,255,0.78);
    box-shadow: var(--inset), 0 16px 40px rgba(17,24,39,0.06);
    padding: 0 18px;
    font-size: 15px;
    outline:none;
    transition: box-shadow 180ms ease, border-color 180ms ease, transform 180ms ease;
  }
  .input::placeholder{ color: rgba(107,114,128,0.55); font-weight: 500; }
  .input:focus{
    border-color: rgba(37,99,235,0.28);
    box-shadow: var(--ring), var(--inset), 0 18px 50px rgba(37,99,235,0.10);
    transform: translateY(-1px);
  }
  .row2{
    display:grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }
  .selectWrap{
    position:relative;
  }
  .selectWrap::after{
    content:"";
    position:absolute;
    right: 18px;
    top: 50%;
    width: 10px;
    height: 10px;
    border-right: 2px solid rgba(37,99,235,0.70);
    border-bottom: 2px solid rgba(37,99,235,0.70);
    transform: translateY(-60%) rotate(45deg);
    pointer-events:none;
    opacity: 0.8;
  }
  select.input{
    appearance:none;
    padding-right: 48px;
    color: rgba(17,24,39,0.90);
    font-weight: 600;
    cursor:pointer;
  }
  .sectionTitle{
    text-align:center;
    margin-top: 18px;
    margin-bottom: 10px;
    font-size: 12px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: rgba(107,114,128,0.80);
    font-weight: 800;
  }
  .domainGrid{
    display:grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 14px;
    margin-top: 12px;
  }
  .pill{
    height: 52px;
    border-radius: var(--radiusPill);
    border: 1px solid rgba(17,24,39,0.06);
    background: rgba(255,255,255,0.72);
    box-shadow: var(--inset), 0 16px 40px rgba(17,24,39,0.06);
    font-weight: 800;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    font-size: 12px;
    color: rgba(107,114,128,0.95);
    cursor:pointer;
    transition: transform 140ms ease, box-shadow 160ms ease, background 160ms ease, border-color 160ms ease, color 160ms ease;
    position:relative;
    overflow:hidden;
  }
  .pill:hover{
    transform: translateY(-1px);
    box-shadow: 0 20px 55px rgba(17,24,39,0.08);
    border-color: rgba(37,99,235,0.14);
  }
  .pill:active{ transform: translateY(0px) scale(0.99); }
  .pill.active{
    color: white;
    border-color: rgba(255,255,255,0.30);
    background: linear-gradient(90deg, rgba(11,63,179,0.97), rgba(29,78,216,0.93), rgba(59,130,246,0.88));
    box-shadow: 0 18px 60px rgba(37,99,235,0.22), inset 0 1px 0 rgba(255,255,255,0.35);
  }
  .pill.active::after{
    content:"";
    position:absolute;
    inset:-60%;
    background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.35), transparent 55%);
    transform: rotate(18deg);
    pointer-events:none;
  }
  .cta{
    margin-top: 22px;
    width:100%;
    height: 58px;
    border-radius: var(--radiusPill);
    border: 1px solid rgba(255,255,255,0.22);
    background: linear-gradient(90deg, rgba(11,63,179,0.98), rgba(29,78,216,0.94), rgba(59,130,246,0.90));
    color: white;
    font-weight: 900;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    box-shadow: 0 22px 70px rgba(37,99,235,0.22);
    cursor:pointer;
    transition: transform 140ms ease, box-shadow 160ms ease, filter 160ms ease;
  }
  .cta:hover{
    transform: translateY(-1px);
    box-shadow: 0 26px 80px rgba(37,99,235,0.26);
    filter: saturate(1.06);
  }
  .cta:active{ transform: translateY(0px) scale(0.995); }
  .footerHint{
    margin-top: 14px;
    text-align:center;
    font-size: 12px;
    color: rgba(107,114,128,0.78);
    font-weight: 600;
  }

  /* ---------- CHAT UI ---------- */
  .appShell{
    position:fixed;
    top:0;
    right:0;
    bottom:var(--dock-clearance);
    left:0;
    z-index:5;
    display:none;
    background:white;
    min-height:calc(var(--app-height) - var(--dock-clearance));
  }
  .chatHeader{
    height:64px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding: max(0px, var(--safe-top)) calc(16px + var(--safe-right)) 0 calc(16px + var(--safe-left));
    border-bottom:1px solid #e5e7eb;
    background:white;
    min-height:calc(64px + var(--safe-top));
    gap:12px;
  }
  .chatHeader .left{
    display:flex;
    flex-direction:column;
    gap:2px;
    min-width:0;
  }
  .chatTitle{
    font-weight:800;
    font-size:15px;
    color:#111827;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  .chatSub{
    font-weight:700;
    font-size:11px;
    color:#6b7280;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  .headerBtns{
    display:flex;
    gap:10px;
    align-items:center;
    flex-shrink:0;
  }
  .miniBtn{
    height:38px;
    padding:0 14px;
    border-radius:999px;
    border:1px solid #e5e7eb;
    background:#fff;
    font-weight:800;
    font-size:12px;
    letter-spacing:0.06em;
    cursor:pointer;
  }
  .miniBtn.primary{
    border: 1px solid rgba(255,255,255,0.4);
    background: rgba(37,99,235,0.85);
    backdrop-filter: blur(12px);
    color:white;
    box-shadow: 0 8px 32px rgba(37,99,235,0.25), inset 0 1px 0 rgba(255,255,255,0.3);
    transition: all 0.2s ease;
  }
  .miniBtn.primary:hover{
    background: rgba(37,99,235,1);
    transform: translateY(-1px);
    box-shadow: 0 12px 40px rgba(37,99,235,0.35);
  }
  .miniBtn:disabled{
    opacity:0.55;
    cursor:not-allowed;
    transform:none !important;
    box-shadow:none !important;
  }

  .chatBody{
    position:absolute;
    top:calc(64px + var(--safe-top));
    bottom:calc(74px + var(--safe-bottom));
    left:0;
    right:0;
    overflow:auto;
    background:white;
    padding:18px calc(14px + var(--safe-right)) 18px calc(14px + var(--safe-left));
    -webkit-overflow-scrolling:touch;
    overscroll-behavior:contain;
  }

  .bubbleRow{
    display:flex;
    margin:10px 0;
  }
  .bubbleRow.me{ justify-content:flex-end; }
  .bubbleRow.pt{ justify-content:flex-start; }
  .bubbleRow.contextRow{ justify-content:center; }

  .bubble{
    max-width:min(720px, 86%);
    padding:13px 15px;
    border-radius:20px;
    font-size:14px;
    line-height:1.45;
    box-shadow: 0 12px 28px rgba(17,24,39,0.08);
    border:1px solid transparent;
    white-space:pre-wrap;
  }
  .bubble.me{
    background: linear-gradient(135deg, #0b3fb3 0%, #1d4ed8 55%, #3b82f6 100%);
    border-color: rgba(37,99,235,0.28);
    color:#ffffff;
    border-bottom-right-radius:8px;
  }
  .bubble.pt{
    background: linear-gradient(135deg, #eff6ff 0%, #dbeafe 45%, #e0f2fe 100%);
    border-color: rgba(59,130,246,0.16);
    color:#0f172a;
    border-bottom-left-radius:8px;
  }
  .contextBubble{
    width:min(980px, 100%);
    padding:12px 18px;
    border-radius:14px;
    background:linear-gradient(135deg,#f8fafc 0%, #eff6ff 100%);
    border:1px solid #dbeafe;
    color:#1f2937;
    font-size:16px;
    font-weight:800;
    line-height:1.45;
    text-align:center;
    box-shadow:0 12px 28px rgba(15,23,42,0.06);
  }

  .typing{
    display:inline-flex;
    gap:6px;
    align-items:center;
  }
  .dot{
    width:7px;height:7px;border-radius:999px;background:#9ca3af;
    animation:bounce 1s infinite;
  }
  .dot:nth-child(2){ animation-delay:.12s;}
  .dot:nth-child(3){ animation-delay:.24s;}
  @keyframes bounce{
    0%,100%{ transform:translateY(0); opacity:.6;}
    50%{ transform:translateY(-4px); opacity:1;}
  }

  .chatInputBar{
    position:absolute;
    left:0; right:0; bottom:0;
    min-height:74px;
    padding:12px calc(12px + var(--safe-right)) calc(12px + var(--safe-bottom)) calc(12px + var(--safe-left));
    border-top:1px solid #e5e7eb;
    background:white;
    display:flex;
    gap:10px;
    align-items:center;
  }
  .chatInput{
    flex:1;
    height:48px;
    border-radius:999px;
    border:1px solid #e5e7eb;
    padding:0 16px;
    font-size:14px;
    outline:none;
    min-width:0;
  }
  .sendBtn{
    width:98px;
    min-width:86px;
    height:48px;
    border-radius:999px;
    border:none;
    font-weight:900;
    letter-spacing:0.10em;
    text-transform:uppercase;
    background:linear-gradient(90deg, rgba(11,63,179,0.98), rgba(29,78,216,0.94), rgba(59,130,246,0.90));
    color:white;
    cursor:pointer;
  }
  .sendBtn:disabled{ opacity:.55; cursor:not-allowed; }

  /* ---------- REPORT (PRINTABLE) ---------- */
  .reportWrap{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(255,255,255,0.2);
    backdrop-filter: blur(40px);
    overflow:auto;
    z-index:20;
    padding:calc(40px + var(--safe-top)) calc(20px + var(--safe-right)) calc(40px + var(--safe-bottom)) calc(20px + var(--safe-left));
  }
  .reportCard{
    max-width:1120px;
    margin:0 auto;
    padding:40px;
    background:rgba(255,255,255,0.7);
    border:1px solid rgba(255,255,255,0.8);
    border-radius:32px;
    box-shadow: 0 40px 100px rgba(17,24,39,0.15);
  }
  .auvira-dock-wrap{
    position:fixed;
    left:50%;
    bottom:0;
    transform:translateX(-50%);
    width:min(860px, calc(100% - 24px - var(--safe-left) - var(--safe-right)));
    z-index:12;
    pointer-events:none;
  }
  .auvira-dock{
    position:relative;
    width:100%;
    height:54px;
    border-radius:20px 20px 0 0;
    background:linear-gradient(180deg, rgba(255,255,255,0.76), rgba(232,242,255,0.48));
    backdrop-filter:blur(18px);
    -webkit-backdrop-filter:blur(18px);
    border:1px solid rgba(29,78,216,0.22);
    border-bottom:none;
    box-shadow:0 -10px 34px rgba(29,78,216,0.16), inset 0 1px 0 rgba(255,255,255,0.42);
    overflow:hidden;
    transition:height 0.34s ease;
    cursor:pointer;
    pointer-events:auto;
  }
  .auvira-dock:hover,
  .auvira-dock.open{
    height:140px;
  }
  .auvira-collapsed{
    position:absolute;
    inset:0;
    height:54px;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:0 18px;
    transition:opacity 0.18s ease;
  }
  .auvira-dock:hover .auvira-collapsed,
  .auvira-dock.open .auvira-collapsed{
    opacity:0;
    pointer-events:none;
  }
  .auvira-tab{
    font-family:"Plus Jakarta Sans", Inter, system-ui, sans-serif;
    font-size:1rem;
    font-weight:800;
    letter-spacing:0.34em;
    text-transform:uppercase;
    background:linear-gradient(90deg, #0b3fb3, #1d4ed8, #60a5fa);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    background-clip:text;
    color:transparent;
    user-select:none;
    text-indent:0.34em;
  }
  .auvira-expanded{
    position:absolute;
    inset:0;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:9px;
    padding:18px 20px 16px;
    opacity:0;
    transform:translateY(10px);
    transition:opacity 0.25s ease, transform 0.25s ease;
    pointer-events:none;
    text-align:center;
  }
  .auvira-dock:hover .auvira-expanded,
  .auvira-dock.open .auvira-expanded{
    opacity:1;
    transform:translateY(0);
    pointer-events:auto;
  }
  .auvira-title{
    margin:0;
    font-family:"Plus Jakarta Sans", Inter, system-ui, sans-serif;
    font-size:1.28rem;
    font-weight:800;
    letter-spacing:0.28em;
    text-transform:uppercase;
    line-height:1;
    background:linear-gradient(90deg, #0b3fb3, #1d4ed8, #60a5fa);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    background-clip:text;
    color:transparent;
    text-indent:0.28em;
  }
  .auvira-line{
    width:88px;
    height:3px;
    border-radius:999px;
    background:linear-gradient(90deg, #0b3fb3, #1d4ed8, #78b5ff);
    opacity:0.75;
  }
  .auvira-subtitle{
    margin:0;
    max-width:650px;
    font-family:"Plus Jakarta Sans", Inter, system-ui, sans-serif;
    font-size:0.68rem;
    font-weight:700;
    line-height:1.55;
    letter-spacing:0.11em;
    text-transform:uppercase;
    color:#5f7ccb;
  }
  body.view-start .auvira-dock-wrap{
    opacity:1;
    visibility:visible;
    transform:translateX(-50%) translateY(0);
    transition:opacity 0.18s ease, transform 0.18s ease, visibility 0.18s ease;
  }
  body.view-chat .auvira-dock-wrap{
    opacity:1;
    visibility:visible;
    transform:translateX(-50%) translateY(0);
    transition:opacity 0.18s ease, transform 0.18s ease, visibility 0.18s ease;
  }
  body.view-chat .auvira-dock{
    pointer-events:none;
    cursor:default;
    height:54px;
  }
  body.view-chat .auvira-dock:hover,
  body.view-chat .auvira-dock.open{
    height:54px;
  }
  body.view-chat .auvira-collapsed{
    opacity:1 !important;
    pointer-events:auto !important;
  }
  body.view-chat .auvira-expanded{
    opacity:0 !important;
    transform:translateY(10px) !important;
    pointer-events:none !important;
  }
  body.view-report .auvira-dock-wrap{
    opacity:0;
    visibility:hidden;
    transform:translateX(-50%) translateY(14px);
    transition:opacity 0.18s ease, transform 0.18s ease, visibility 0.18s ease;
  }

function romanToIntent(text) {

}

function levenshtein(a, b) {
  if (a === b) return 0;
  const dp = Array.from({ length: a.length + 1 }, () => Array(b.length + 1).fill(0));
  for (let i = 0; i <= a.length; i++) dp[i][0] = i;
  for (let j = 0; j <= b.length; j++) dp[0][j] = j;
  for (let i = 1; i <= a.length; i++) {
    for (let j = 1; j <= b.length; j++) {
      const cost = a[i - 1] === b[j - 1] ? 0 : 1;
      dp[i][j] = Math.min(dp[i - 1][j] + 1, dp[i][j - 1] + 1, dp[i - 1][j - 1] + cost);
    }
  }
  return dp[a.length][b.length];
}

function tokenClose(a, b) {
  if (!a || !b) return false;
  if (a === b) return true;
  const minLen = Math.min(a.length, b.length);
  const maxLen = Math.max(a.length, b.length);
  if (minLen <= 3) return false;
  const limit = maxLen <= 6 ? 1 : 2;
  if (minLen < 5) return false;
  return levenshtein(a, b) <= limit;
}

function phraseMatches(text, pattern) {
  const t = normalizeInput(text);
  const p = normalizeInput(pattern);
  if (!p) return false;
  const textTokens = t.split(" ").filter(Boolean);
  const patternTokens = p.split(" ").filter(Boolean);
  if (!patternTokens.length) return false;
  if (patternTokens.length === 1 && patternTokens[0].length <= 3) {
    return textTokens.includes(patternTokens[0]);
  }
  if (t === p || t.includes(p)) return true;
  const matchedTokens = patternTokens.filter(pt => textTokens.some(tt => tt === pt || tokenClose(tt, pt)));
  return matchedTokens.length === patternTokens.length;
}

function splitIntentClauses(text) {
  const normalized = normalizeInput(text);
  const parts = normalized
    .split(/\s*(?:,|\?| and | aur | ya | or | & )\s*/gi)
    .map(part => normalizeInput(part))
    .filter(Boolean);
  return parts.length ? parts : [normalized];
}

function intentConfidence(score) {
  if (score >= 3) return "high";
  if (score >= 2) return "medium";
  return "low";
}

function bestIntentScore(text, patterns) {
  let best = 0;
  const normalizedText = normalizeInput(text);
  const textTokens = normalizedText.split(" ").filter(Boolean);
  for (const pattern of patterns) {
    const normalizedPattern = normalizeInput(pattern);
    const patternTokens = normalizedPattern.split(" ").filter(Boolean);
    if (!normalizedPattern) continue;
    if (normalizedText === normalizedPattern) {
      best = Math.max(best, 4);
      continue;
    }
    if (patternTokens.length === 1 && patternTokens[0].length <= 3) {
      if (textTokens.includes(patternTokens[0])) best = Math.max(best, 3);
      continue;
    }
    if (normalizedText.includes(normalizedPattern) || phraseMatches(normalizedText, normalizedPattern)) {
      best = Math.max(best, normalizedPattern.split(" ").length > 1 ? 3 : 2);
      continue;
    }
    const matchedTokens = patternTokens.filter(pt => textTokens.some(tt => tokenClose(tt, pt))).length;
    if (matchedTokens === patternTokens.length && patternTokens.length > 0) {
      best = Math.max(best, patternTokens.length > 1 ? 3 : 2);
    } else if (patternTokens.length > 1 && matchedTokens >= patternTokens.length - 1) {
      best = Math.max(best, 1);
    }
  }
  return best;
}

function pickFrom(source) {
  return Array.isArray(source) ? rand(source) : source;
}

function pickUnique(source, count = 2) {
  if (!Array.isArray(source)) return source ? [source] : [];
  const pool = [...new Set(source)];
  const picked = [];
  while (pool.length && picked.length < count) {
    const index = Math.floor(Math.random() * pool.length);
    picked.push(pool.splice(index, 1)[0]);
  }
  return picked;
}

function joinNatural(parts) {
  const clean = [...new Set(parts.filter(Boolean).map(s => String(s).trim()))];
  if (!clean.length) return "";
  if (clean.length === 1) return clean[0];
  if (clean.length === 2) return clean[0] + " Aur " + clean[1].charAt(0).toLowerCase() + clean[1].slice(1);
  return clean.slice(0, -1).join(" ") + " Aur " + clean[clean.length - 1].charAt(0).toLowerCase() + clean[clean.length - 1].slice(1);
}

function deterministicPick(source) {
  if (Array.isArray(source)) return source.find(Boolean) || "";
  return source || "";
}

function normalizeResponseSentence(text) {
  const cleaned = String(text || "").trim();
  if (!cleaned) return "";
  return /[.!?]$/.test(cleaned) ? cleaned : `${cleaned}.`;
}

function detectReplyLanguage(text) {
  const normalized = normalizeInput(text);
  const englishMarkers = ["hello", "hi", "what", "when", "where", "why", "how", "may", "can", "name", "age", "problem", "pain", "fever", "family", "medicine", "history", "take", "start", "type", "severe", "better", "worse", "your", "did", "come", "today"];
  const romanMarkers = ["assalam", "salam", "kya", "kab", "kahan", "kitna", "kis", "aap", "main", "mein", "naam", "age", "mera", "meri", "mujhe", "hai", "hain", "koi", "lete", "li", "li hai", "loon", "loonga", "loongi", "masla", "pain", "fever", "barhta", "kam", "aya", "aayi", "aaye", "takleef", "period"];
  const englishScore = englishMarkers.filter(word => normalized.includes(word)).length;
  const romanScore = romanMarkers.filter(word => normalized.includes(word)).length;
  if (romanScore && romanScore >= englishScore) return "roman";
  if (englishScore > romanScore) return "english";
  return "mixed";
}

    " started ", " appears ", " appeared ", " gradual ", " suddenly ", " center ", " pressure ",
    " walking ", " sitting ", " child ", " out of 10 ", " better ", " worse ", " helps ",
    " no ", " not ", " currently ", " left ", " right ", " chest ", " abdomen ", " neck ",
    " swelling ", " discharge ", " operation ", " surgery ", " medication ", " family "
  ];
  const romanMarkers = [
    " hai ", " hain ", " se ", " mera ", " meri ", " mujhe ", " bache ", " bacha ", " dard ",
    " bukhar ", " shuru ", " achanak ", " barhta ", " kam ", " chalne ", " baithne ", " tak ",

    " soojan ", " pehle ", " daaye ", " baaye ", " zyada ", " kamzor "
  ];
  return {
    english: englishMarkers.filter(word => normalized.includes(word)).length,
    roman: romanMarkers.filter(word => normalized.includes(word)).length
  };
}

function selectLocalizedValue(source, languageMode) {
  if (!Array.isArray(source)) return source || "";
  if (!source.length) return "";
  if (languageMode === "mixed") return deterministicPick(source);
  const preferred = source.filter(item => {
    const style = detectResponseStyle(item);
    return style === languageMode || style === "mixed";
  });
  return deterministicPick(preferred.length ? preferred : source);
}

function isComplaintKnown(state) {
  return !!(state.complaintElicited || state.lastComplaint);
}

function localizeRubricValue(value) {
  if (!value) return value;
  if (typeof value === "object" && !Array.isArray(value)) return value;
  if (Array.isArray(value)) {
    const scored = value.map(item => {
      const scores = responseLanguageScores(item);
      return { item, english: scores.english, roman: scores.roman };
    });
    const englishBest = [...scored].sort((a, b) => ((b.english - b.roman) - (a.english - a.roman)) || (b.english - a.english))[0];
    const romanBest = [...scored].sort((a, b) => ((b.roman - b.english) - (a.roman - a.english)) || (b.roman - a.roman))[0];
    const english = (englishBest && englishBest.item) || value[0] || "";
    const roman = (romanBest && romanBest.item) || value[0] || "";
    return { english, roman };
  }
  return { english: value, roman: value };
}

function getRubricAnswer(activeCase, rubricKey, languageMode) {
  const answer = activeCase.rubricAnswers ? activeCase.rubricAnswers[rubricKey] : "";
  if (!answer) return "";
  if (typeof answer === "string") return normalizeResponseSentence(answer);
  if (Array.isArray(answer)) return normalizeResponseSentence(selectLocalizedValue(answer, languageMode));
  if (typeof answer === "object") {
    const value = languageMode === "roman"
      ? (answer.roman || answer.english || "")
      : (answer.english || answer.roman || "");
    return normalizeResponseSentence(value);
  }
  return "";
}

function tokenPatternScore(normalizedText, pattern) {
  const tokens = normalizedText.split(" ").filter(Boolean);
  const matches = pattern.every(word => {
    const normalizedWord = normalizeInput(word);
    if (normalizedWord.length <= 3) return tokens.includes(normalizedWord);
    return tokens.includes(normalizedWord) || tokens.some(token => tokenClose(token, normalizedWord));
  });
  if (!matches) return 0;
  return pattern.length > 1 ? 3 : 2;
}

function phraseScore(normalizedText, phrase) {
  const normalizedPhrase = normalizeInput(phrase);
  if (!normalizedPhrase) return 0;
  const phraseTokens = normalizedPhrase.split(" ").filter(Boolean);
  const textTokens = normalizedText.split(" ").filter(Boolean);
  if (phraseTokens.length === 1 && phraseTokens[0].length <= 3) {
    return textTokens.includes(phraseTokens[0]) ? 4 : 0;
  }
  if (phraseTokens.length === 1) {
    if (textTokens.includes(phraseTokens[0])) return 4;
    if (textTokens.some(token => tokenClose(token, phraseTokens[0]))) return 3;
    return 0;
  }
  if (normalizedText === normalizedPhrase) return 5;
  if (normalizedText.includes(normalizedPhrase)) return 4;
  if (phraseMatches(normalizedText, normalizedPhrase)) return 3;
  return 0;
}

function scoreIntentInText(normalizedText, intent) {
  let best = 0;
  const phraseList = INTENT_PHRASES[intent] || [];
  const tokenPatterns = INTENT_MAP[intent] || [];
  for (const phrase of phraseList) {
    best = Math.max(best, phraseScore(normalizedText, phrase));
  }
  for (const tokenPattern of tokenPatterns) {
    best = Math.max(best, tokenPatternScore(normalizedText, tokenPattern));
  }
  return best;
}

function matchIntent(normalizedText) {
  let bestIntent = null;
  let bestScore = 0;
  for (const intent of INTENT_PRIORITY) {
    const score = scoreIntentInText(normalizedText, intent);
    if (score > bestScore) {
      bestScore = score;
      bestIntent = intent;
    }
  }
  return bestScore >= 2 ? bestIntent : null;
}

function detectIntent(userText) {
  const normalized = normalizeInput(userText);
  return matchIntent(normalized);
}

function validateIntentAgainstStage(intents, state) {
  if (!intents.length) {
    return { ok: false, message: UNCLEAR_HISTORY_REPLY };

  if (!isComplaintKnown(state) && intents.some(intent => BLOCKED_BEFORE_COMPLAINT.has(intent))) {
    return { ok: false, message: EARLY_DETAIL_REPLY };
  }

  return { ok: true };
}

    "surgical_history",
    "medications",
    "allergies",
    "family_history",
    "social_history"
  ];

  const replies = [...new Set(responseOrder
    .filter(intent => uniqueIntents.includes(intent))
    .map(intent => {
      const rubricKeys = INTENT_TO_CASE_FIELDS[intent] || [];
      if (!rubricKeys.length) return "";
      const reply = rubricKeys.map(rubricKey => getRubricAnswer(activeCase, rubricKey, languageMode)).filter(Boolean).join(" ");
      return reply || "";
    })
    .filter(Boolean))];

  return replies.join(" ").trim() || UNCLEAR_HISTORY_REPLY;
}

function updateConversationStateFromIntents(intents, state, activeCase) {
  if (intents.includes("greeting")) state.greeted = true;
  if (intents.includes("introduction")) state.introduced = true;
  if (intents.includes("consent_request")) state.consentTaken = true;

  const nextStage = intents.map(intent => STAGE_BY_INTENT[intent]).filter(Boolean).pop();
  if (nextStage) state.stage = nextStage;

  if (intents.includes("chief_complaint")) {
    state.complaintElicited = true;
    state.lastComplaint = activeCase.complaint;
    state.stage = "HOPC";
  }
}

function handleUserMessage(userText) {
  const intents = detectIntents(userText, appState);
  const supportedIntents = filterIntentsByFirstYearRubric(intents, appState);
  appState.lastClassification = {
    primaryIntent: supportedIntents[0] || intents[0] || null,
    allIntents: supportedIntents,
    confidence: supportedIntents.length ? "high" : (intents.length ? "medium" : "low")
  };

  const validation = validateIntentAgainstStage(intents, appState);
  if (!validation.ok) return validation.message;
  if (!supportedIntents.length) return UNCLEAR_HISTORY_REPLY;

  const languageMode = detectReplyLanguage(userText);
  const reply = generateStrictPatientReply(supportedIntents, appState, appState.activeCase, languageMode);
  if (reply && reply !== UNCLEAR_HISTORY_REPLY && reply !== EARLY_DETAIL_REPLY) {
    scoreQuestion(userText);
  }
  if (countHistoryQuestion(supportedIntents)) {
    appState.historyQuestionCount += 1;
    updateEndButtonState();
  }
  updateConversationStateFromIntents(supportedIntents, appState, appState.activeCase);

  supportedIntents.forEach(intent => {
    appState.lastIntentKey = intent;
    appState.disclosed.add(intent);
  });

  return reply || UNCLEAR_HISTORY_REPLY;
}

function answerFromCase(userText) {
  return handleUserMessage(userText);
}

function sendMessage() {
  const inp = document.getElementById("chatInput");
  const q = inp.value.trim();
  if (!q) return;
  addBubble("student", q);
  appState.transcript.push({ role: "student", text: q });
  inp.value = "";
  const typing = addBubble("patient", "...", true);
  setTimeout(() => {
    const ans = answerFromCase(q);
    typing.bub.textContent = ans;
    appState.transcript.push({ role: "patient", text: ans });

function addBubble(role, text, isTyping = false) {
  const chatBody = document.getElementById("chatBody");
  const row = document.createElement("div");
  row.className = "bubbleRow " + (role === "student" ? "me" : (role === "context" ? "contextRow" : "pt"));
  const bub = document.createElement("div");
  if (role === "context") {
    bub.className = "contextBubble";
    bub.textContent = text;
  } else {
    bub.className = "bubble " + (role === "student" ? "me" : "pt");
    if (isTyping) bub.innerHTML = '<span class="typing"><span class="dot"></span><span class="dot"></span><span class="dot"></span></span>';
    else bub.textContent = text;
  }
  row.appendChild(bub);
  chatBody.appendChild(row);
  chatBody.scrollTop = chatBody.scrollHeight;
  return { row, bub };
}

    .replace(/\s+were explored\.?$/i, "")
    .replace(/\s+were reviewed\.?$/i, "")
    .replace(/\s+was reviewed\.?$/i, "")
    .replace(/\s+was clarified\.?$/i, "")
    .replace(/\s+was checked\.?$/i, "")
    .replace(/\s+were assessed\.?$/i, "")
    .replace(/\s+was assessed\.?$/i, "");

  if (!core) core = label;
  const pluralLike = /\b(symptoms|rigors|chills|parents|periods|changes|bowels|lungs)\b/i.test(core) || /\bwere\b/i.test(label);
  const verb = pluralLike ? "were" : "was";
  return row.status === "partial" ? `${core} ${verb} only partially addressed.` : `${core} ${verb} not addressed.`;
}

function buildGaps(rows) {
  return rows
    .filter(r => r.status !== "done")
    .sort((a, b) => Number(b.critical) - Number(a.critical))
    .slice(0, 8)
    .map(r => ({
      text: gapStatementForRow(r),
      suggestedQuestion: suggestedQuestionForGap(r),
      key: r.key
    }));
}

function domainSpecificLine() {
  const domain = appState.student.domain;
  if (domain === "Pediatrics") return "Pediatric-specific review should comment on feeding, vaccination status, and basic birth history where relevant.";
  if (domain === "Surgery") return "Surgical review should document swelling or lesion characteristics, duration, pain profile, and any discharge when applicable.";
  if (domain === "Gynecology") return "First-year gyne history should focus on communication, core biodata, and clear elicitation of the presenting complaint.";
  return "Core symptom analysis should integrate site, onset, duration, severity, associated symptoms, and aggravating or relieving factors.";
}

function buildApproachBullets() {
  return rubricSnapshot().filter(r => r.section === "approach").slice(0, 6).map(r => r.status === "done" ? r.label : (r.status === "partial" ? `${r.label} was partially achieved.` : `${r.label} was missed.`));
}

function buildHPCBullets() {
  const rows = rubricSnapshot().filter(r => r.section === "hpc");
  const completed = rows.filter(r => r.status === "done").slice(0, 4).map(r => r.label);
  const missed = rows.filter(r => r.status !== "done").slice(0, 3).map(r => r.status === "partial" ? `${r.label} was partially covered.` : `${r.label} was missed.`);
  const caseAligned = complaintSpecificSummary(rubricSnapshot()).slice(0, 4);
  return completed.concat(missed).concat(caseAligned.length ? caseAligned : [domainSpecificLine()]);
}

function buildSystemReviewSummary() {
  const rows = rubricSnapshot().filter(r => r.section === "systems");
  if (!rows.length) return "No dedicated system-review rubric items were required for this case.";
  const done = rows.filter(r => r.status === "done").length;
  const partial = rows.filter(r => r.status === "partial").length;
  const complaint = String(appState.activeCase?.complaint || "the complaint").toLowerCase();
  if (done >= Math.max(3, Math.ceil(rows.length * 0.5))) return `System review for ${complaint} was meaningfully developed with several complaint-relevant systems explored.`;
  if (done + partial >= Math.max(2, Math.ceil(rows.length * 0.35))) return `A limited system review for ${complaint} was attempted, but coverage remained incomplete.`;
  return `System review for ${complaint} remained limited and should be expanded with focused associated-symptom questions.`;
}

function buildHistorySummary() {
  const rows = rubricSnapshot().filter(r => r.section === "history");
  if (!rows.length) return "No dedicated background-history rubric items were required for this case.";
  const done = rows.filter(r => r.status === "done").length;
  const partial = rows.filter(r => r.status === "partial").length;
  if (done >= Math.max(3, Math.ceil(rows.length * 0.5))) return "Background history-taking was reasonably detailed and aligned with this case scenario.";
  if (done + partial >= Math.max(2, Math.ceil(rows.length * 0.35))) return "Some background history was explored, but key contextual areas remain incomplete for this case.";
  return "Background history remained insufficient for a complete case-aligned assessment.";
}

function safeFilePart(s) {
  return String(s || "Candidate").replace(/[^\w.-]+/g, "_").replace(/^_+|_+$/g, "") || "Candidate";
}

function formatScore(score) {
  return Number.isInteger(score) ? String(score) : score.toFixed(1);
}

function complaintSpecificSummary(rows) {
  const domain = appState.student.domain;
  const complaint = String(appState.activeCase?.complaint || "").toLowerCase();
  const keyPrefixes = [];

  if (domain === "Medicine") {
    if (complaint.includes("chest pain")) keyPrefixes.push("med_cp_");
    else if (complaint.includes("fever")) keyPrefixes.push("med_fever_");
    else if (complaint.includes("abdominal pain")) keyPrefixes.push("med_ap_");
    else if (complaint.includes("shortness of breath")) keyPrefixes.push("med_sob_");
    else keyPrefixes.push("med_generic_");
  } else if (domain === "Pediatrics") {
    if (complaint.includes("fever")) keyPrefixes.push("peds_fever_");
    else if (complaint.includes("cough")) keyPrefixes.push("peds_cough_");
    else if (complaint.includes("diarrhea")) keyPrefixes.push("peds_diarrhea_");
    else keyPrefixes.push("peds_generic_");
  } else if (domain === "Surgery") {
    if (complaint.includes("ulcer")) keyPrefixes.push("surg_ulcer_");
    else keyPrefixes.push("surg_lump_");
  } else if (domain === "Gynecology") {
    keyPrefixes.push("gyn_");
  }

  const caseRows = rows.filter(row => (
    (row.section === "hpc" || row.section === "systems" || row.section === "history")
    && keyPrefixes.some(prefix => row.key.startsWith(prefix))
  ));

  if (!caseRows.length) return [];

  const prioritized = caseRows
    .sort((a, b) => Number(b.critical) - Number(a.critical))
    .slice(0, 6);

  return prioritized.map(row => (
    row.status === "done"
      ? row.label
      : row.status === "partial"
        ? `${row.label} was partially addressed.`
        : `${row.label} was not addressed.`
  ));
}

function buildHistoryBullets(rows) {
  const historyRows = rows.filter(r => r.section === "history");
  if (!historyRows.length) return [];
  return historyRows
    .sort((a, b) => Number(b.critical) - Number(a.critical))
    .slice(0, 4)
    .map(r => (
      r.status === "done"
        ? r.label
        : r.status === "partial"
          ? `${r.label} was partially covered.`
          : `${r.label} was not addressed.`
    ));
}

function sectionScore(rows, section) {
  const subset = rows.filter(r => r.section === section);
  if (!subset.length) return null;
  const earned = subset.reduce((sum, row) => sum + row.score, 0);
  return `${formatScore(earned)} / ${subset.length}`;
}

}

function generateReportDocument() {
  const report = generateReportMarkup();
  return {
    ...report,
    html: `<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CaseFlow Report</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>${reportStyles()}</style>
</head>
<body>${report.body}</body>
</html>`
  };
}

function downloadCurrentReport() {
  if (!window.html2pdf) {
    alert("PDF export library is not available.");
    return;
  }
  const report = generateReportDocument();
  const reportCard = document.getElementById("reportCard");
  if (!reportCard.querySelector(".report-shell")) {
    reportCard.innerHTML = `<style>${reportStyles()}</style>${report.body}`;
  }

  const sourceNode = reportCard.querySelector(".report-shell");
  if (!sourceNode) {
    alert("Report content is not ready yet.");
    return;
  }

  const exportHost = document.createElement("div");
  exportHost.style.position = "fixed";
  exportHost.style.inset = "0";
  exportHost.style.zIndex = "9999";
  exportHost.style.overflow = "auto";
  exportHost.style.background = "#ffffff";
  exportHost.style.padding = "24px";

  const exportStyle = document.createElement("style");
  exportStyle.textContent = `${reportStyles()} .rBtn{display:none !important;} body{background:#ffffff !important;padding:0 !important;} .report-head{box-shadow:none !important;} .report-shell{max-width:1120px !important;}`;
  const exportNode = sourceNode.cloneNode(true);
  exportNode.querySelectorAll(".rBtn").forEach(node => node.remove());

  exportHost.appendChild(exportStyle);
  exportHost.appendChild(exportNode);
  document.body.appendChild(exportHost);

  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      html2pdf().set({
        margin: [8, 8, 8, 8],
        filename: report.fileName,
        image: { type: "jpeg", quality: 0.98 },
        html2canvas: { scale: 2, useCORS: true, backgroundColor: "#ffffff" },
        jsPDF: { unit: "mm", format: "a4", orientation: "portrait" },
        pagebreak: { mode: ["css", "legacy"] }
      }).from(exportNode).save().then(() => {
        exportHost.remove();
      }).catch(() => {
        exportHost.remove();
        alert("Unable to generate PDF.");
      });
    });
  });
}

const domainGrid = document.getElementById("domainGrid");
domainGrid.addEventListener("click", e => {
  const btn = e.target.closest("button[data-domain]");
  if (!btn) return;
  selectedDomain = btn.dataset.domain;
  domainGrid.querySelectorAll(".pill").forEach(p => p.classList.remove("active"));
  btn.classList.add("active");
  document.getElementById("hint").textContent = "Selected: " + selectedDomain;
});

document.getElementById("startBtn").addEventListener("click", startSimulation);
document.getElementById("sendBtn").addEventListener("click", sendMessage);
document.getElementById("chatInput").addEventListener("keydown", e => e.key === "Enter" && sendMessage());
document.getElementById("endBtn").addEventListener("click", endAndReport);
document.getElementById("resetBtn").addEventListener("click", () => confirm("Return to domain selection?") && returnToDomainSelection());

let selectedDomain = "Medicine";

syncViewportHeight();
updateEndButtonState();
window.addEventListener("resize", syncViewportHeight);
window.addEventListener("orientationchange", syncViewportHeight);
if (window.visualViewport) {
  window.visualViewport.addEventListener("resize", syncViewportHeight);
  window.visualViewport.addEventListener("scroll", syncViewportHeight);
}

const dock = document.getElementById("auviraDock");
if (dock) {
  dock.addEventListener("click", () => {
    if (window.innerWidth <= 768) {
      dock.classList.toggle("open");
    }
  });

  document.addEventListener("click", (e) => {
    if (window.innerWidth <= 768 && !dock.contains(e.target)) {
      dock.classList.remove("open");
    }
  });
}
